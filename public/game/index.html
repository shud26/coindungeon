<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코인던전 — 청산 서바이벌</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #100b14 url('lq-stone.png'); background-size: 280px; color: #f3e9d2;
         font-family: 'Galmuri11', monospace; -webkit-font-smoothing: none; display: flex; flex-direction: column; align-items: center;
         min-height: 100vh; padding: 18px; image-rendering: pixelated; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 110%, rgba(255,90,20,.13), transparent 55%), rgba(10,6,14,.55); pointer-events: none; z-index: 0; }
  #wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }

  /* ── 타이틀 화면 ── */
  #setupScreen { width: min(640px, 94vw); display: flex; flex-direction: column; align-items: stretch; }
  #titleArt { width: 100%; border: 4px solid #3a2c3e; border-radius: 6px 6px 0 0; display: block; border-bottom: none;
              box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b; }
  #titleText { text-align: center; padding: 14px 0 10px; background: #170f1c; border-left: 4px solid #3a2c3e; border-right: 4px solid #3a2c3e;
               box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b; }
  #titleText h1 { font-size: 44px; color: #ffd54a; text-shadow: 0 4px 0 #7a2d0c, 0 0 24px rgba(255,140,30,.5); letter-spacing: 3px; }
  #titleText .sub { font-family: 'Galmuri9', monospace; color: #9a8570; font-size: 18px; margin-top: 6px; }

  #setup { background: rgba(20,14,24,.92) url('lq-stone.png'); background-size: 240px; background-blend-mode: multiply;
           border: 4px solid #3a2c3e; border-radius: 0 0 6px 6px; padding: 20px 26px 24px; width: 100%;
           box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b, inset 0 0 40px rgba(0,0,0,.6); }
  .row { margin: 13px 0; }
  label { font-family: 'Galmuri9', monospace; font-size: 18px; color: #c9b08f; display: block; margin-bottom: 8px; }
  #levVal { color: #ffd54a; font-size: 33px; text-shadow: 0 2px 0 #7a2d0c; }
  #levWarn { font-family: 'Galmuri9', monospace; font-size: 18px; margin-left: 8px; color: #ff8a70; }
  input[type=range] { width: 100%; accent-color: #ff9d2d; height: 24px; }
  .sidebtns { display: flex; gap: 10px; }
  .sidebtns button, #startBtn, #retryBtn {
    flex: 1; padding: 13px; font-family: 'Galmuri11', monospace; font-size: 16px;
    border: 3px solid #3a2c3e; border-radius: 4px; background: #1c1424; color: #9a8570; cursor: pointer; }
  .sidebtns button.on-long { background: #0f2e1c; border-color: #2fbf6b; color: #6ee7a0; box-shadow: 0 0 14px rgba(47,191,107,.25); }
  .sidebtns button.on-short { background: #351310; border-color: #e5533d; color: #ff8a70; box-shadow: 0 0 14px rgba(229,83,61,.25); }
  #startBtn { margin-top: 16px; display: block; width: 100%; background: linear-gradient(180deg, #ffd54a, #f0a72e); color: #241405;
              border-color: #8a5a10; font-size: 22px; text-shadow: 0 1px 0 rgba(255,255,255,.4);
              box-shadow: 0 4px 0 #6b4008, 0 8px 24px rgba(255,160,40,.25); }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b4008; }
  #liqPreview { font-family: 'Galmuri9', monospace; font-size: 14px; color: #9a8570; margin-top: 12px; text-align: center; line-height: 1.6; }

  /* ── 게임 ── */
  #game { display: none; width: min(940px, 96vw); }
  #hpWrap { margin: 2px 0 8px; }
  #hpLabel { font-family: 'Galmuri9', monospace; display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 4px; text-shadow: 0 2px 2px #000; }
  #hpLabel b { color: #ffd54a; font-size: 18px; }
  #hpBar { height: 24px; background: #16101c; border: 3px solid #4a3a52; border-radius: 3px; overflow: hidden;
           box-shadow: inset 0 3px 8px rgba(0,0,0,.7); }
  #hpFill { height: 100%; width: 100%; background: linear-gradient(90deg, #2fbf6b, #6ee7a0); transition: width .12s linear; }
  #subhud { font-family: 'Galmuri9', monospace; display: flex; justify-content: space-between; font-size: 14px; color: #9a8570; margin-bottom: 6px; flex-wrap: wrap; gap: 4px; text-shadow: 0 1px 2px #000; }
  #subhud b { color: #f3e9d2; }
  canvas { width: 100%; border: 4px solid #4a3a52; border-radius: 6px; background: #0d0a10;
           box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b, 0 12px 44px rgba(0,0,0,.8); }

  #exitBtn { margin-top: 10px; display: block; width: 100%; padding: 15px; font-family: 'Galmuri11', monospace; font-size: 22px;
             border: 3px solid #2fbf6b; border-radius: 4px; background: linear-gradient(180deg, #17402a, #0f2e1c); color: #6ee7a0;
             cursor: pointer; box-shadow: 0 4px 0 #082014, 0 0 18px rgba(47,191,107,.2); }
  #exitBtn.loss { border-color: #e5533d; background: linear-gradient(180deg, #401a14, #2e100c); color: #ff8a70; box-shadow: 0 4px 0 #1c0805; }
  #exitBtn:active { transform: translateY(3px); box-shadow: none; }
  #exitHint { text-align: center; font-family: 'Galmuri9', monospace; font-size: 14px; color: #9a8570; margin-top: 8px; }

  /* ── 사망 ── */
  #death, #escape { position: fixed; inset: 0; background: rgba(14,5,3,.92); z-index: 10; display: none; align-items: center; justify-content: center; }
  #escape { background: rgba(6,14,8,.92); }
  #escapeCard { background: #10180f url('lq-stone.png'); background-size: 240px; background-blend-mode: multiply;
                border: 4px solid #2fbf6b; border-radius: 6px; padding: 0 0 26px; text-align: center;
                width: min(500px, 92vw); overflow: hidden; box-shadow: 0 0 80px rgba(80,255,140,.25); }
  #escapeCard img { width: 100%; display: block; border-bottom: 3px solid #14401f; }
  #escapeCard h2 { color: #ffd54a; font-size: 44px; margin: 14px 0 8px; text-shadow: 0 4px 0 #4a3a08, 0 0 30px rgba(255,215,80,.5); letter-spacing: 10px; }
  #escRoe { font-size: 33px; margin-bottom: 6px; }
  #escapeStats { font-family: 'Galmuri9', monospace; font-size: 15px; line-height: 2; color: #e8d9c0; text-shadow: 0 1px 2px #000; }
  #escapeStats b { color: #ffd54a; }
  #escLesson { margin: 14px 22px; padding: 13px; background: rgba(6,10,6,.75); border: 2px solid #1c3a24; border-radius: 4px;
               font-family: 'Galmuri9', monospace; font-size: 14px; color: #8fe7a8; line-height: 1.8; }
  #escRetryBtn { flex: 1; padding: 13px; font-family: 'Galmuri11', monospace; font-size: 16px; border: 3px solid #8a5a10; border-radius: 4px;
                 cursor: pointer; background: linear-gradient(180deg, #ffd54a, #f0a72e); color: #241405;
                 width: calc(100% - 44px); box-shadow: 0 4px 0 #6b4008; }
  #escRetryBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b4008; }
  .shareBtn { display: block; width: calc(100% - 44px); margin: 10px auto 0; padding: 12px; font-family: 'Galmuri11', monospace;
              font-size: 16px; border: 3px solid #4a3a52; border-radius: 4px; background: #1c1424; color: #c9b08f; cursor: pointer; }
  .shareBtn:active { transform: translateY(2px); }
  #deathCard { background: #170f1c url('lq-stone.png'); background-size: 240px; background-blend-mode: multiply;
               border: 4px solid #e5533d; border-radius: 6px; padding: 0 0 26px; text-align: center;
               width: min(500px, 92vw); overflow: hidden; box-shadow: 0 0 80px rgba(255,90,30,.35); }
  #deathCard img { width: 100%; display: block; border-bottom: 3px solid #4a1a10; }
  #deathCard h2 { color: #ff8a70; font-size: 44px; margin: 14px 0 8px; text-shadow: 0 4px 0 #4a120a, 0 0 30px rgba(255,80,40,.5); letter-spacing: 10px; }
  #deathStats { font-family: 'Galmuri9', monospace; font-size: 15px; line-height: 2; color: #e8d9c0; text-shadow: 0 1px 2px #000; }
  #deathStats b { color: #ffd54a; }
  #lesson { margin: 14px 22px; padding: 13px; background: rgba(10,6,8,.75); border: 2px solid #3a2c1c; border-radius: 4px;
            font-family: 'Galmuri9', monospace; font-size: 14px; color: #ffb84a; line-height: 1.8; }
  #retryBtn { background: linear-gradient(180deg, #ffd54a, #f0a72e); color: #241405; border-color: #8a5a10;
              width: calc(100% - 44px); box-shadow: 0 4px 0 #6b4008; }
  #retryBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b4008; }
</style>
</head>
<body>
<div id="wrap">
  <div id="setupScreen">
    <img id="titleArt" src="lq-title.png" alt="">
    <div id="titleText">
      <h1>코인던전</h1>
      <div class="sub">청산 서바이벌 — 실제 BTC 차트에서 살아남아라</div>
    </div>
    <div id="setup">
      <div class="row">
        <label>레버리지 — <span id="levVal">10x</span><span id="levWarn"></span></label>
        <input type="range" id="lev" min="1" max="100" value="10">
      </div>
      <div class="row">
        <label>방향</label>
        <div class="sidebtns">
          <button id="btnLong" class="on-long">롱 · 오르면 산다</button>
          <button id="btnShort">숏 · 내리면 산다</button>
        </div>
      </div>
      <button id="startBtn">던전 입장 →</button>
      <div id="liqPreview"></div>
    </div>
  </div>

  <div id="game">
    <div id="hpWrap">
      <div id="hpLabel"><span>체력 = 청산까지 거리</span><b id="hpPct">100%</b></div>
      <div id="hpBar"><div id="hpFill"></div></div>
    </div>
    <div id="subhud">
      <span>진입 <b id="hudEntry">-</b></span>
      <span>현재 <b id="hudPrice">-</b></span>
      <span>ROE <b id="hudRoe">0%</b></span>
      <span>생존 <b id="hudTime">0s</b> · 차트 <b id="hudChart">0h</b></span>
    </div>
    <canvas id="cv" width="1312" height="640"></canvas>
    <button id="exitBtn">익절 탈출 · +0.0%</button>
    <div id="exitHint">스페이스바로도 탈출할 수 있습니다 · 버틸수록 커지고, 욕심내면 용암입니다</div>
  </div>
</div>

<div id="escape">
  <div id="escapeCard">
    <img src="lq-escape.png" alt="">
    <h2>생 존</h2>
    <div id="escRoe"></div>
    <div id="escapeStats"></div>
    <div id="escLesson"></div>
    <button id="escRetryBtn">한 판 더 →</button>
    <button class="shareBtn" onclick="shareCard()">공유 카드 저장</button>
  </div>
</div>

<div id="death">
  <div id="deathCard">
    <img src="lq-death.png" alt="">
    <h2>청 산</h2>
    <div id="deathStats"></div>
    <div id="lesson"></div>
    <button id="retryBtn">한 판 더 →</button>
    <button class="shareBtn" onclick="shareCard()">공유 카드 저장</button>
  </div>
</div>

<script src="data.js"></script>
<script>
const $ = id => document.getElementById(id);
let side = 1, lev = 10;
const knight = new Image(); knight.src = 'knight.png';
const caveBg = new Image(); caveBg.src = 'lq-cave.png';

$('lev').addEventListener('input', e => { lev = +e.target.value; $('levVal').textContent = lev + 'x'; preview(); });
$('btnLong').onclick = () => { side = 1; $('btnLong').className = 'on-long'; $('btnShort').className = ''; preview(); };
$('btnShort').onclick = () => { side = -1; $('btnShort').className = 'on-short'; $('btnLong').className = ''; preview(); };
function preview() {
  const pct = (100 / lev).toFixed(2);
  $('levWarn').textContent = lev >= 75 ? '☠☠☠' : lev >= 30 ? '☠☠' : lev >= 10 ? '☠' : '';
  $('liqPreview').innerHTML = `가격이 ${side===1?'아래로':'위로'} <b style="color:#ff8a70">${pct}%</b> 움직이면 용암에 닿습니다`;
}
preview();

let idx, entry, liq, startIdx, t0, timer, alive = false, shake = 0, deathAnim = 0;
const VIEW = 110, SPEED = 90;

function start() {
  lev = +$('lev').value;
  startIdx = 500 + Math.floor(Math.random() * (CANDLES.length - 6000));
  idx = startIdx;
  entry = CANDLES[idx][3];
  liq = side === 1 ? entry * (1 - 1/lev) : entry * (1 + 1/lev);
  $('setupScreen').style.display = 'none';
  $('death').style.display = 'none';
  $('escape').style.display = 'none';
  $('game').style.display = 'block';
  $('hudEntry').textContent = fmt(entry);
  t0 = performance.now(); alive = true; deathAnim = 0;
  timer = setInterval(tick, SPEED);
  draw();
}
$('startBtn').onclick = start;
const backToSetup = () => { $('death').style.display = 'none'; $('escape').style.display = 'none'; $('setupScreen').style.display = 'block'; $('game').style.display = 'none'; };
$('retryBtn').onclick = backToSetup;
$('escRetryBtn').onclick = backToSetup;
$('exitBtn').onclick = () => { if (alive) escape(); };
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && alive) { e.preventDefault(); escape(); }
});

const fmt = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(1);
const hpNow = price => Math.max(0, Math.min(100, Math.abs(price - liq) / Math.abs(entry - liq) * 100));

function tick() {
  idx++;
  const c = CANDLES[idx];
  const dead = side === 1 ? c[2] <= liq : c[1] >= liq;
  const price = c[3];
  const roe = ((price - entry) / entry) * 100 * lev * side;
  const hp = hpNow(price);
  $('hudPrice').textContent = fmt(price);
  const r = $('hudRoe'); r.textContent = (roe>=0?'+':'') + roe.toFixed(1) + '%';
  r.style.color = roe >= 0 ? '#6ee7a0' : '#ff8a70';
  $('hudTime').textContent = ((performance.now() - t0)/1000).toFixed(1) + 's';
  $('hudChart').textContent = (((idx - startIdx) * 5) / 60).toFixed(1) + 'h';
  $('hpPct').textContent = hp.toFixed(0) + '%';
  const fill = $('hpFill');
  fill.style.width = hp + '%';
  fill.style.background = hp > 55 ? 'linear-gradient(90deg,#2fbf6b,#6ee7a0)'
                      : hp > 25 ? 'linear-gradient(90deg,#d9a520,#ffd54a)'
                                : 'linear-gradient(90deg,#c2331f,#ff8a70)';
  shake = hp < 25 ? (25 - hp) / 5 : 0;
  const eb = $('exitBtn');
  if (roe >= 0) { eb.textContent = `익절 탈출 · +${roe.toFixed(1)}%`; eb.className = ''; }
  else { eb.textContent = `손절 탈출 · ${roe.toFixed(1)}%`; eb.className = 'loss'; }
  draw(hp);
  if (dead) die();
}

function die() {
  clearInterval(timer); alive = false;
  let f = 0;
  const anim = setInterval(() => {
    deathAnim = ++f; draw(0);
    if (f >= 14) {
      clearInterval(anim);
      const secs = ((performance.now() - t0)/1000).toFixed(1);
      const chartH = (((idx - startIdx) * 5) / 60).toFixed(1);
      $('deathStats').innerHTML =
        `<b>${lev}x ${side===1?'롱':'숏'}</b>으로 입장 · 실시간 <b>${secs}초</b> 생존<br>` +
        `차트 시간으로는 <b>${chartH}시간</b> 버텼습니다<br>` +
        `진입 ${fmt(entry)} → 용암 ${fmt(liq)}`;
      $('lesson').textContent = lesson();
      lastResult = { type: 'death', roe: -100, lev, side, secs, chartH, entry, px: liq };
      $('death').style.display = 'flex';
    }
  }, 55);
}

function escape() {
  clearInterval(timer); alive = false;
  const price = CANDLES[idx][3];
  const roe = ((price - entry) / entry) * 100 * lev * side;
  const secs = ((performance.now() - t0)/1000).toFixed(1);
  const chartH = (((idx - startIdx) * 5) / 60).toFixed(1);
  const er = $('escRoe');
  er.textContent = (roe>=0?'+':'') + roe.toFixed(1) + '%';
  er.style.color = roe >= 0 ? '#6ee7a0' : '#ff8a70';
  $('escapeStats').innerHTML =
    `<b>${lev}x ${side===1?'롱':'숏'}</b> · 실시간 <b>${secs}초</b> · 차트 <b>${chartH}시간</b> 버팀<br>` +
    `진입 ${fmt(entry)} → 탈출 ${fmt(price)}`;
  $('escLesson').textContent = escLesson(roe);
  lastResult = { type: 'escape', roe, lev, side, secs, chartH, entry, px: price };
  $('escape').style.display = 'flex';
}

function escLesson(roe) {
  if (roe >= 200) return `+${roe.toFixed(0)}%. 완벽한 탈출입니다. 무서운 건, 실전에서 이 맛을 본 사람이 다음 판에 전 재산을 겁니다.`;
  if (roe >= 50) return `이 타이밍에 내리는 게 제일 어렵습니다. 실전의 나는 "조금만 더"를 외치다 용암에 빠집니다.`;
  if (roe >= 0) return `소소하지만 살아서 나왔습니다. 선물 시장에서 익절로 끝나는 판은 생각보다 귀합니다.`;
  return `손절도 탈출입니다. 청산보다 백 배 낫습니다. 실전에서 이걸 누를 수 있는 사람이 상위 10%입니다.`;
}

function lesson() {
  if (lev >= 75) return `${lev}x에서는 ${(100/lev).toFixed(1)}%만 흔들려도 전액이 사라집니다. BTC는 5분에 1% 움직이는 날이 흔합니다.`;
  if (lev >= 30) return `${lev}x의 청산 거리 ${(100/lev).toFixed(1)}%는 하루 평균 변동폭보다 좁습니다. 생존이 기적에 가깝습니다.`;
  if (lev >= 10) return `${lev}x는 며칠은 버팁니다. 하지만 큰 캔들 하나면 끝. 실전에선 펀딩비가 체력을 추가로 갉아먹습니다.`;
  return `${lev}x에서도 결국 청산됐습니다. 방향이 틀리면 레버리지는 시간 문제일 뿐입니다. 이것이 선물의 본질입니다.`;
}

// ── 공유 카드 ──
let lastResult = null;
const escapeImg = new Image(); escapeImg.src = 'lq-escape.png';
const deathImg = new Image(); deathImg.src = 'lq-death.png';
function shareCard() {
  if (!lastResult) return;
  const r = lastResult, dead = r.type === 'death';
  const c = document.createElement('canvas'); c.width = 720; c.height = 960;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  x.fillStyle = '#100b14'; x.fillRect(0, 0, 720, 960);
  const img = dead ? deathImg : escapeImg;
  if (img.complete) x.drawImage(img, 0, 0, 720, 540);
  x.strokeStyle = dead ? '#e5533d' : '#2fbf6b'; x.lineWidth = 8; x.strokeRect(4, 4, 712, 952);
  x.textAlign = 'center';
  x.fillStyle = dead ? '#ff8a70' : '#ffd54a';
  x.font = '64px Galmuri11';
  x.fillText(dead ? '청 산' : '생 존', 360, 640);
  x.fillStyle = dead ? '#ff8a70' : '#6ee7a0';
  x.font = '44px Galmuri11';
  x.fillText((r.roe >= 0 ? '+' : '') + r.roe.toFixed(1) + '%', 360, 710);
  x.fillStyle = '#e8d9c0';
  x.font = '24px Galmuri9';
  x.fillText(`${r.lev}x ${r.side===1?'롱':'숏'} · 실시간 ${r.secs}초 · 차트 ${r.chartH}시간 버팀`, 360, 770);
  x.fillText(`진입 ${fmt(r.entry)} → ${dead ? '용암' : '탈출'} ${fmt(r.px)}`, 360, 810);
  x.fillStyle = '#9a8570';
  x.font = '20px Galmuri9';
  x.fillText('코인던전 — 청산 서바이벌', 360, 890);
  x.fillText('coindungeon.games', 360, 922);
  c.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `코인던전-${dead?'청산':'생존'}-${r.lev}x.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  });
}

// ── 렌더 ──
const cv = $('cv'), ctx = cv.getContext('2d');
let lavaT = 0;
function draw(hp = 100) {
  lavaT += 0.15;
  const W = cv.width, H = cv.height;
  ctx.save();
  if (shake > 0) ctx.translate((Math.random()-0.5)*shake*2.2, (Math.random()-0.5)*shake*2.2);

  // 동굴 배경
  if (caveBg.complete) {
    ctx.globalAlpha = 0.9; ctx.drawImage(caveBg, 0, 0, W, H); ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(10,7,14,0.45)'; ctx.fillRect(0, 0, W, H);
  } else { ctx.fillStyle = '#0d0a10'; ctx.fillRect(0, 0, W, H); }

  const s = Math.max(startIdx - 20, idx - VIEW), view = CANDLES.slice(s, idx + 1);
  let lo = Math.min(...view.map(c => c[2]), liq), hi = Math.max(...view.map(c => c[1]), liq);
  const pad = (hi - lo) * 0.12; lo -= pad; hi += pad;
  const Y = v => H - ((v - lo) / (hi - lo)) * H;
  const slot = W / VIEW, bw = Math.max(3, slot * 0.6);
  const liqY = Y(liq);

  // 용암
  const lavaGrad = side === 1 ? ctx.createLinearGradient(0, liqY, 0, H) : ctx.createLinearGradient(0, liqY, 0, 0);
  lavaGrad.addColorStop(0, '#ff8a2d'); lavaGrad.addColorStop(0.22, '#e5341f'); lavaGrad.addColorStop(1, '#4a0b04');
  ctx.fillStyle = lavaGrad;
  ctx.beginPath();
  if (side === 1) { ctx.moveTo(0, H); ctx.lineTo(0, liqY); } else { ctx.moveTo(0, 0); ctx.lineTo(0, liqY); }
  for (let x = 0; x <= W; x += 12) {
    const wob = Math.sin(lavaT + x * 0.045) * 4 + Math.sin(lavaT*1.7 + x*0.02) * 3;
    ctx.lineTo(x, liqY + wob);
  }
  if (side === 1) ctx.lineTo(W, H); else ctx.lineTo(W, 0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,140,50,0.16)';
  ctx.fillRect(0, side===1 ? liqY-28 : liqY, W, 28);
  ctx.fillStyle = '#ffcf6b';
  for (let i = 0; i < 8; i++) {
    const bx = ((i * 173 + lavaT * 36) % W);
    const by = liqY + Math.sin(lavaT*2 + i*2) * 3 + (side===1 ? 9 : -9);
    ctx.fillRect(bx, by, 4, 4);
  }

  // 캔들
  view.forEach((c, i) => {
    const x = i * slot + slot/2;
    const up = c[3] >= c[0];
    ctx.strokeStyle = up ? '#3ddc84' : '#e5533d';
    ctx.fillStyle = up ? '#3ddc84' : '#e5533d';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, Y(c[1])); ctx.lineTo(x, Y(c[2])); ctx.stroke();
    const top = Y(Math.max(c[0], c[3])), h = Math.max(3, Y(Math.min(c[0], c[3])) - top);
    ctx.fillRect(x - bw/2, top, bw, h);
  });

  // 진입선
  ctx.strokeStyle = 'rgba(243,233,210,0.4)'; ctx.setLineDash([8, 6]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, Y(entry)); ctx.lineTo(W, Y(entry)); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(243,233,210,0.65)'; ctx.font = '18px Galmuri9';
  ctx.fillText('진입', 10, Y(entry) - 6);

  // 기사
  const last = view[view.length - 1];
  const kx = (view.length - 1) * slot + slot/2;
  const ky = Y(last[3]);
  if (deathAnim > 0) {
    ctx.fillStyle = `rgba(255,${150 - deathAnim*8},40,${1 - deathAnim/15})`;
    ctx.beginPath(); ctx.arc(kx, ky, deathAnim * 7, 0, 7); ctx.fill();
    ctx.fillStyle = `rgba(255,220,80,${1 - deathAnim/15})`;
    ctx.beginPath(); ctx.arc(kx, ky, deathAnim * 3.5, 0, 7); ctx.fill();
  } else if (knight.complete) {
    const kw = 54, kh = kw * (knight.height / knight.width);
    const bounce = Math.sin(lavaT * 1.3) * 2 + (shake ? (Math.random()-0.5)*4 : 0);
    ctx.drawImage(knight, kx - kw/2, ky - kh + 4 + bounce, kw, kh);
  }

  // 위험 비네트
  if (hp < 30 && alive) {
    const v = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.75);
    v.addColorStop(0, 'rgba(0,0,0,0)'); v.addColorStop(1, `rgba(220,40,10,${(30-hp)/55})`);
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}
</script>
</body>
</html>

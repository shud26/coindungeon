<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코인던전 — 청산 서바이벌</title>
<meta property="og:title" content="코인던전 — 청산 서바이벌">
<meta property="og:description" content="층을 오를수록 레버리지가 오르는 던전. 실제 BTC 차트에서 벌고, 하산해야 골드가 내 것. 청산되면 전부 용암行.">
<meta property="og:image" content="https://coindungeon.games/game/lq-title.png">
<meta property="og:url" content="https://coindungeon.games/game/">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="knight.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #100b14 url('lq-stone.png'); background-size: 280px; color: #f3e9d2;
         font-family: 'Galmuri11', monospace; -webkit-font-smoothing: none; display: flex; flex-direction: column; align-items: center;
         min-height: 100vh; padding: 18px; image-rendering: pixelated; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 110%, rgba(255,90,20,.13), transparent 55%), rgba(10,6,14,.55); pointer-events: none; z-index: 0; }
  #wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }

  /* ── 타이틀 화면 ── */
  #setupScreen { width: min(640px, 94vw); display: flex; flex-direction: column; align-items: stretch; }
  #titleArt { width: 100%; border: 4px solid #3a2c3e; border-radius: 6px 6px 0 0; display: block; border-bottom: none;
              box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b; }
  #titleText { text-align: center; padding: 14px 0 10px; background: #170f1c; border-left: 4px solid #3a2c3e; border-right: 4px solid #3a2c3e;
               box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b; }
  #titleText h1 { font-size: 44px; color: #ffd54a; text-shadow: 0 4px 0 #7a2d0c, 0 0 24px rgba(255,140,30,.5); letter-spacing: 3px; }
  #titleText .sub { font-family: 'Galmuri9', monospace; color: #9a8570; font-size: 18px; margin-top: 6px; }

  #setup { background: rgba(20,14,24,.92) url('lq-stone.png'); background-size: 240px; background-blend-mode: multiply;
           border: 4px solid #3a2c3e; border-radius: 0 0 6px 6px; padding: 20px 26px 24px; width: 100%;
           box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b, inset 0 0 40px rgba(0,0,0,.6); }
  .row { margin: 13px 0; }
  label { font-family: 'Galmuri9', monospace; font-size: 18px; color: #c9b08f; display: block; margin-bottom: 8px; }
  #vaultRow { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; background: rgba(10,6,8,.6);
              border: 2px solid #3a2c1c; border-radius: 4px; padding: 11px 14px; font-family: 'Galmuri9', monospace; font-size: 16px; }
  #vaultRow b { color: #ffd54a; }
  #rankTitle { color: #8fe7a8; }
  .sidebtns { display: flex; gap: 10px; }
  .sidebtns button, #startBtn, #retryBtn {
    flex: 1; padding: 13px; font-family: 'Galmuri11', monospace; font-size: 16px;
    border: 3px solid #3a2c3e; border-radius: 4px; background: #1c1424; color: #9a8570; cursor: pointer; }
  .sidebtns button.on-long { background: #0f2e1c; border-color: #2fbf6b; color: #6ee7a0; box-shadow: 0 0 14px rgba(47,191,107,.25); }
  .sidebtns button.on-short { background: #351310; border-color: #e5533d; color: #ff8a70; box-shadow: 0 0 14px rgba(229,83,61,.25); }
  #startBtn { margin-top: 16px; display: block; width: 100%; background: linear-gradient(180deg, #ffd54a, #f0a72e); color: #241405;
              border-color: #8a5a10; font-size: 22px; text-shadow: 0 1px 0 rgba(255,255,255,.4);
              box-shadow: 0 4px 0 #6b4008, 0 8px 24px rgba(255,160,40,.25); }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b4008; }
  #rules { font-family: 'Galmuri9', monospace; font-size: 14px; color: #9a8570; margin-top: 12px; text-align: center; line-height: 1.7; }
  #rules b { color: #ffb84a; }

  /* ── 게임 ── */
  #game { display: none; width: min(940px, 96vw); }
  #hpWrap { margin: 2px 0 8px; }
  #hpLabel { font-family: 'Galmuri9', monospace; display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 4px; text-shadow: 0 2px 2px #000; }
  #hpLabel b { color: #ffd54a; font-size: 18px; }
  #hpBar { height: 24px; background: #16101c; border: 3px solid #4a3a52; border-radius: 3px; overflow: hidden;
           box-shadow: inset 0 3px 8px rgba(0,0,0,.7); }
  #hpFill { height: 100%; width: 100%; background: linear-gradient(90deg, #2fbf6b, #6ee7a0); transition: width .12s linear; }
  #subhud { font-family: 'Galmuri9', monospace; display: flex; justify-content: space-between; font-size: 14px; color: #9a8570; margin-bottom: 6px; flex-wrap: wrap; gap: 4px; text-shadow: 0 1px 2px #000; }
  #subhud b { color: #f3e9d2; }
  canvas { width: 100%; border: 4px solid #4a3a52; border-radius: 6px; background: #0d0a10;
           box-shadow: 0 0 0 3px #100b14, 0 0 0 5px #241b2b, 0 12px 44px rgba(0,0,0,.8); }

  #btnRow { display: flex; gap: 10px; margin-top: 10px; }
  #switchBtn { flex: 2; padding: 15px; font-family: 'Galmuri11', monospace; font-size: 20px;
               border: 3px solid #8a5a10; border-radius: 4px; background: linear-gradient(180deg, #ffd54a, #f0a72e); color: #241405;
               cursor: pointer; box-shadow: 0 4px 0 #6b4008; text-shadow: 0 1px 0 rgba(255,255,255,.35); }
  #switchBtn:active { transform: translateY(3px); box-shadow: none; }
  #descendBtn { flex: 1; padding: 15px; font-family: 'Galmuri11', monospace; font-size: 16px;
                border: 3px solid #2fbf6b; border-radius: 4px; background: linear-gradient(180deg, #17402a, #0f2e1c); color: #6ee7a0;
                cursor: pointer; box-shadow: 0 4px 0 #082014; }
  #descendBtn:disabled { border-color: #3a2c3e; background: #1c1424; color: #5a5145; box-shadow: none; cursor: default; }
  #descendBtn:active:not(:disabled) { transform: translateY(3px); box-shadow: none; }
  #exitHint { text-align: center; font-family: 'Galmuri9', monospace; font-size: 14px; color: #9a8570; margin-top: 8px; }

  /* ── 오버레이 공통 ── */
  #death, #escape, #clear { position: fixed; inset: 0; background: rgba(14,5,3,.92); z-index: 10; display: none; align-items: center; justify-content: center; }
  #escape { background: rgba(6,14,8,.92); }
  #clear { background: rgba(20,14,4,.92); }
  .resultCard { background: #170f1c url('lq-stone.png'); background-size: 240px; background-blend-mode: multiply;
                border-radius: 6px; padding: 0 0 26px; text-align: center; width: min(500px, 92vw); overflow: hidden; }
  .resultCard img { width: 100%; display: block; }
  .resultCard h2 { font-size: 44px; margin: 14px 0 8px; letter-spacing: 10px; }
  .stats { font-family: 'Galmuri9', monospace; font-size: 15px; line-height: 2; color: #e8d9c0; text-shadow: 0 1px 2px #000; }
  .stats b { color: #ffd54a; }
  .lessonBox { margin: 14px 22px; padding: 13px; background: rgba(10,6,8,.75); border: 2px solid #3a2c1c; border-radius: 4px;
               font-family: 'Galmuri9', monospace; font-size: 14px; line-height: 1.8; }
  .goldBtn { padding: 13px; font-family: 'Galmuri11', monospace; font-size: 16px; border: 3px solid #8a5a10; border-radius: 4px;
             cursor: pointer; background: linear-gradient(180deg, #ffd54a, #f0a72e); color: #241405;
             width: calc(100% - 44px); box-shadow: 0 4px 0 #6b4008; }
  .goldBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b4008; }
  .shareBtn { display: block; width: calc(100% - 44px); margin: 10px auto 0; padding: 12px; font-family: 'Galmuri11', monospace;
              font-size: 16px; border: 3px solid #4a3a52; border-radius: 4px; background: #1c1424; color: #c9b08f; cursor: pointer; }
  .shareBtn:active { transform: translateY(2px); }
  .greenBtn { display: block; width: calc(100% - 44px); margin: 10px auto 0; padding: 12px; font-family: 'Galmuri11', monospace;
              font-size: 16px; border: 3px solid #2fbf6b; border-radius: 4px; background: linear-gradient(180deg, #17402a, #0f2e1c);
              color: #6ee7a0; cursor: pointer; box-shadow: 0 3px 0 #082014; }
  .greenBtn:active { transform: translateY(2px); box-shadow: none; }

  #deathCard { border: 4px solid #e5533d; box-shadow: 0 0 80px rgba(255,90,30,.35); }
  #deathCard img { border-bottom: 3px solid #4a1a10; }
  #deathCard h2 { color: #ff8a70; text-shadow: 0 4px 0 #4a120a, 0 0 30px rgba(255,80,40,.5); }
  #lesson { color: #ffb84a; }

  #escapeCard { border: 4px solid #2fbf6b; background-color: #10180f; box-shadow: 0 0 80px rgba(80,255,140,.25); }
  #escapeCard img { border-bottom: 3px solid #14401f; }
  #escapeCard h2 { color: #ffd54a; text-shadow: 0 4px 0 #4a3a08, 0 0 30px rgba(255,215,80,.5); }
  #escGold { font-size: 33px; margin-bottom: 6px; color: #ffd54a; }
  #escLesson { color: #8fe7a8; border-color: #1c3a24; background: rgba(6,10,6,.75); }

  #clearCard { border: 4px solid #ffd54a; background-color: #1c1408; box-shadow: 0 0 80px rgba(255,213,74,.3); }
  #clearCard h2 { color: #ffd54a; text-shadow: 0 4px 0 #4a3a08, 0 0 30px rgba(255,215,80,.6); margin-top: 24px; }
  #clearGold { font-size: 33px; color: #6ee7a0; margin-bottom: 6px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="setupScreen">
    <img id="titleArt" src="lq-title.png" alt="">
    <div id="titleText">
      <h1>코인던전</h1>
      <div class="sub">청산 서바이벌 — 층을 오를수록 레버리지가 오른다</div>
    </div>
    <div id="setup">
      <div class="row">
        <div id="vaultRow">
          <span>금고 <b id="vaultView">0G</b></span>
          <span>최고 기록 <b id="bestView">-</b></span>
          <span id="rankTitle">초행자</span>
        </div>
      </div>
      <div class="row">
        <label>첫 방향 (판 중에 스위치 가능)</label>
        <div class="sidebtns">
          <button id="btnLong" class="on-long">롱 · 오르면 산다</button>
          <button id="btnShort">숏 · 내리면 산다</button>
        </div>
      </div>
      <button id="startBtn">B1층 입장 (5배) →</button>
      <div id="rules">
        목표 수익을 채우면 <b>다음 층 문</b>이 열린다 · 층마다 레버리지 상승<br>
        골드는 <b>하산해야 금고에 입금</b> · 청산되면 이번 런 골드 전부 소실
      </div>
    </div>
  </div>

  <div id="game">
    <div id="hpWrap">
      <div id="hpLabel"><span id="floorLabel">B1층 · 목표 +25%</span><b id="hpPct">100%</b></div>
      <div id="hpBar"><div id="hpFill"></div></div>
    </div>
    <div id="subhud">
      <span>ROE <b id="hudRoe">0%</b></span>
      <span>런 골드 <b id="hudGold">0G</b></span>
      <span>펀딩 <b id="hudFund">-0.0%</b></span>
      <span>스위치 <b id="hudSwitch">0회</b></span>
      <span>생존 <b id="hudTime">0s</b></span>
    </div>
    <canvas id="cv" width="1312" height="640"></canvas>
    <div id="btnRow">
      <button id="switchBtn">스위치 → 숏 (수수료 -5%)</button>
      <button id="descendBtn" disabled>하산 · 0G</button>
    </div>
    <div id="exitHint">위엔 황금 문, 아래엔 용암 · 방향이 틀렸으면 스위치 (PC 스페이스바) · 펀딩비가 계속 샌다</div>
  </div>
</div>

<div id="clear">
  <div id="clearCard" class="resultCard">
    <h2>층 클리어</h2>
    <div id="clearGold"></div>
    <div id="clearStats" class="stats"></div>
    <button id="nextFloorBtn" class="goldBtn" style="margin-top:14px">B2층 입장 (10배) →</button>
    <button id="bankBtn" class="greenBtn">하산해서 입금</button>
  </div>
</div>

<div id="escape">
  <div id="escapeCard" class="resultCard">
    <img src="lq-escape.png" alt="">
    <h2>하 산</h2>
    <div id="escGold"></div>
    <div id="escapeStats" class="stats"></div>
    <div id="escLesson" class="lessonBox"></div>
    <button id="escRetryBtn" class="goldBtn">다시 등반 →</button>
    <button class="shareBtn" onclick="shareCard()">공유 카드 저장</button>
  </div>
</div>

<div id="death">
  <div id="deathCard" class="resultCard">
    <img src="lq-death.png" alt="">
    <h2>청 산</h2>
    <div id="deathStats" class="stats"></div>
    <div id="lesson" class="lessonBox"></div>
    <button id="retryBtn" class="goldBtn">1층부터 다시 →</button>
    <button class="shareBtn" onclick="shareCard()">공유 카드 저장</button>
  </div>
</div>

<script src="data.js"></script>
<script>
const $ = id => document.getElementById(id);

// ── 층 설계 ──
const LEVS = [5, 10, 15, 25, 35, 50, 65, 80, 90, 100];
const levOf = f => LEVS[Math.min(f - 1, LEVS.length - 1)];
const targetOf = f => Math.min(60, 25 + (f - 1) * 5);   // 층 클리어 ROE
const goldOf = f => f * 100;
const FUND_TICK = 0.010;   // 틱당 펀딩비 (%p)
const SWITCH_FEE = 5;      // 스위치 수수료 (%p)
const VIEW = 110, SPEED = 90;

// ── 저장 (금고·기록) ──
const store = {
  get vault() { return +(localStorage.getItem('lq_vault') || 0); },
  set vault(v) { localStorage.setItem('lq_vault', v); },
  get best() { return +(localStorage.getItem('lq_best') || 0); },
  set best(v) { localStorage.setItem('lq_best', v); },
};
function rankTitle(vault, best) {
  if (best >= 10) return '심연의 정복자';
  if (best >= 7) return '용암 스케이터';
  if (vault >= 20000) return '던전 부호';
  if (vault >= 8000) return '금고지기';
  if (best >= 4) return '중층 등반가';
  if (vault >= 1000) return '견습 광부';
  return '초행자';
}
function refreshTitle() {
  $('vaultView').textContent = store.vault.toLocaleString() + 'G';
  $('bestView').textContent = store.best > 0 ? 'B' + store.best + '층' : '-';
  $('rankTitle').textContent = rankTitle(store.vault, store.best);
}

// ── 익명 카운터 ──
function track(t, roe, secs, floor) {
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;
  try {
    fetch('https://liq-survival.vercel.app/api/event', {
      method: 'POST', keepalive: true,
      body: JSON.stringify({ t, lev, side, roe, secs, floor }),
    });
  } catch (e) {}
}

// ── 8비트 사운드 ──
let AC;
function ac() { AC = AC || new (window.AudioContext || window.webkitAudioContext)(); if (AC.state === 'suspended') AC.resume(); return AC; }
function tone(f0, f1, dur, type, vol, delay = 0) {
  try {
    const a = ac(), t = a.currentTime + delay;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(a.destination); o.start(t); o.stop(t + dur);
  } catch (e) {}
}
function noiseBurst(dur, vol) {
  try {
    const a = ac(), t = a.currentTime;
    const buf = a.createBuffer(1, a.sampleRate * dur, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = a.createBufferSource(); src.buffer = buf;
    const g = a.createGain(); g.gain.value = vol;
    src.connect(g).connect(a.destination); src.start(t);
  } catch (e) {}
}
const sfx = {
  start() { tone(220, 440, 0.12, 'square', 0.10); tone(440, 880, 0.12, 'square', 0.08, 0.10); },
  death() { noiseBurst(0.5, 0.22); tone(220, 35, 0.6, 'sawtooth', 0.18); },
  clear() { [659, 784, 988, 1319].forEach((f, i) => tone(f, f, 0.13, 'square', 0.11, i * 0.08)); tone(1568, 1568, 0.3, 'square', 0.08, 0.36); },
  bank() { [523, 659, 784, 1047, 1319].forEach((f, i) => tone(f, f, 0.12, 'square', 0.10, i * 0.07)); },
  switch() { noiseBurst(0.12, 0.10); tone(600, 200, 0.15, 'sawtooth', 0.12); tone(200, 700, 0.12, 'square', 0.10, 0.13); },
  heart() { tone(70, 50, 0.09, 'sine', 0.22); },
  coin() { tone(988, 1319, 0.09, 'square', 0.09); },
};

// ── 상태 ──
let side = 1, lev = 5, floor = 1, runGold = 0;
let idx, entry, liq, startIdx, t0run, t0floor, timer, alive = false, shake = 0, deathAnim = 0;
let lockedRoe = 0, fundAcc = 0, switches = 0, cleared = false;
const knight = new Image(); knight.src = 'knight.png';
const caveBg = new Image(); caveBg.src = 'lq-cave.png';

$('btnLong').onclick = () => { side = 1; $('btnLong').className = 'on-long'; $('btnShort').className = ''; };
$('btnShort').onclick = () => { side = -1; $('btnShort').className = 'on-short'; $('btnLong').className = ''; };

// 변동성 높은 구간을 골라서 시작 (횡보 노잼 방지)
function pickStart() {
  let best = null, bestScore = -1;
  for (let k = 0; k < 25; k++) {
    const cand = 500 + Math.floor(Math.random() * (CANDLES.length - 6000));
    let move = 0;
    for (let i = cand; i < cand + 350; i += 5) {
      move += Math.abs(CANDLES[i + 5][3] - CANDLES[i][3]) / CANDLES[i][3];
    }
    if (move > bestScore) { bestScore = move; best = cand; }
  }
  return best;
}

const fmt = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(1);
const legRoe = price => ((price - entry) / entry) * 100 * lev * side;
const effRoe = price => lockedRoe + legRoe(price) - fundAcc;
const hpNow = price => Math.max(0, Math.min(100, Math.abs(price - liq) / Math.abs(entry - liq) * 100));
// 목표 ROE에 닿는 가격 (황금 문 라인)
function doorPrice() {
  const need = targetOf(floor) - lockedRoe + fundAcc;
  return entry * (1 + side * need / (100 * lev));
}

function startRun() {
  floor = 1; runGold = 0;
  t0run = performance.now();
  startFloor();
}
function startFloor() {
  lev = levOf(floor);
  startIdx = pickStart();
  idx = startIdx;
  entry = CANDLES[idx][3];
  liq = side === 1 ? entry * (1 - 1 / lev) : entry * (1 + 1 / lev);
  lockedRoe = 0; fundAcc = 0; switches = 0; cleared = false;
  deathAnim = 0; alive = true;
  t0floor = performance.now();
  $('setupScreen').style.display = 'none';
  $('death').style.display = 'none';
  $('escape').style.display = 'none';
  $('clear').style.display = 'none';
  $('game').style.display = 'block';
  $('floorLabel').textContent = `B${floor}층 · ${lev}배 · 목표 +${targetOf(floor)}%`;
  $('hudGold').textContent = runGold.toLocaleString() + 'G';
  updateButtons(0);
  sfx.start();
  clearInterval(timer);
  timer = setInterval(tick, SPEED);
  draw();
}
$('startBtn').onclick = startRun;
$('retryBtn').onclick = () => { $('death').style.display = 'none'; backToTitle(); };
$('escRetryBtn').onclick = () => { $('escape').style.display = 'none'; backToTitle(); };
function backToTitle() {
  $('game').style.display = 'none';
  $('setupScreen').style.display = 'block';
  refreshTitle();
}

function updateButtons(roe) {
  const sb = $('switchBtn');
  sb.textContent = `스위치 → ${side === 1 ? '숏' : '롱'} (수수료 -${SWITCH_FEE}%)`;
  const db = $('descendBtn');
  db.textContent = `하산 · ${runGold.toLocaleString()}G`;
  db.disabled = runGold <= 0;
}

// 스위치: 현재 다리 손익 확정 → 반대 방향 재진입 (수수료)
function doSwitch() {
  if (!alive) return;
  const price = CANDLES[idx][3];
  lockedRoe += legRoe(price) - SWITCH_FEE;
  side = -side;
  entry = price;
  liq = side === 1 ? entry * (1 - 1 / lev) : entry * (1 + 1 / lev);
  switches++;
  $('hudSwitch').textContent = switches + '회';
  sfx.switch();
  updateButtons();
}
$('switchBtn').onclick = doSwitch;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && alive) { e.preventDefault(); doSwitch(); }
});
$('descendBtn').onclick = () => { if (alive && runGold > 0) { stopPlay(); bank(); } };

function stopPlay() { clearInterval(timer); alive = false; }

function tick() {
  idx++;
  fundAcc += FUND_TICK;
  const c = CANDLES[idx];
  const dead = side === 1 ? c[2] <= liq : c[1] >= liq;
  const price = c[3];
  const roe = effRoe(price);
  const hp = hpNow(price);
  const r = $('hudRoe'); r.textContent = (roe >= 0 ? '+' : '') + roe.toFixed(1) + '%';
  r.style.color = roe >= 0 ? '#6ee7a0' : '#ff8a70';
  $('hudFund').textContent = '-' + fundAcc.toFixed(1) + '%';
  $('hudTime').textContent = ((performance.now() - t0run) / 1000).toFixed(1) + 's';
  $('hpPct').textContent = hp.toFixed(0) + '%';
  const fill = $('hpFill');
  fill.style.width = hp + '%';
  fill.style.background = hp > 55 ? 'linear-gradient(90deg,#2fbf6b,#6ee7a0)'
                      : hp > 25 ? 'linear-gradient(90deg,#d9a520,#ffd54a)'
                                : 'linear-gradient(90deg,#c2331f,#ff8a70)';
  shake = hp < 25 ? (25 - hp) / 5 : 0;
  if (hp < 35 && idx % Math.max(2, Math.round(hp / 5)) === 0) sfx.heart();
  draw(hp);
  if (dead) { die(); return; }
  if (roe >= targetOf(floor)) floorClear();
}

// ── 층 클리어 ──
function floorClear() {
  stopPlay(); cleared = true;
  const g = goldOf(floor);
  runGold += g;
  sfx.clear();
  $('clearGold').textContent = '+' + g.toLocaleString() + 'G';
  $('clearStats').innerHTML =
    `B<b>${floor}</b>층 돌파 · 스위치 <b>${switches}</b>회 · 펀딩 <b>-${fundAcc.toFixed(1)}%</b><br>` +
    `이번 런 골드 <b>${runGold.toLocaleString()}G</b> — 아직 내 것 아님`;
  const nf = floor + 1;
  $('nextFloorBtn').textContent = `B${nf}층 입장 (${levOf(nf)}배) →`;
  $('bankBtn').textContent = `하산해서 입금 (+${runGold.toLocaleString()}G)`;
  $('clear').style.display = 'flex';
}
$('nextFloorBtn').onclick = () => { floor++; startFloor(); };
$('bankBtn').onclick = () => { $('clear').style.display = 'none'; bank(); };

// ── 하산 (입금) ──
function bank() {
  const secs = ((performance.now() - t0run) / 1000).toFixed(1);
  store.vault = store.vault + runGold;
  if (floor > store.best && cleared) store.best = floor;
  track('escape', runGold, secs, floor);
  sfx.bank();
  $('escGold').textContent = '+' + runGold.toLocaleString() + 'G 입금';
  $('escapeStats').innerHTML =
    `B<b>${floor}</b>층까지 등반 · 실시간 <b>${secs}초</b><br>` +
    `금고 잔액 <b>${store.vault.toLocaleString()}G</b> · 칭호 <b>${rankTitle(store.vault, store.best)}</b>`;
  $('escLesson').textContent = bankLesson();
  lastResult = { type: 'bank', floor, gold: runGold, vault: store.vault, secs };
  $('escape').style.display = 'flex';
}
function bankLesson() {
  if (floor >= 7) return `B${floor}층에서 내려올 줄 아는 사람은 드뭅니다. 실전에서도 익절은 기술이 아니라 성격입니다.`;
  if (floor >= 4) return `중층에서의 하산, 훌륭합니다. 한 층 더는 언제나 달콤해 보이고, 그래서 위험합니다.`;
  return `작게 벌고 살아나왔습니다. 던전은 도망 안 갑니다 — 내일 또 오면 됩니다.`;
}

// ── 사망 ──
function die() {
  stopPlay(); sfx.death();
  const secs = ((performance.now() - t0run) / 1000).toFixed(1);
  if (floor - 1 > store.best) store.best = floor - 1;  // 클리어한 층까지가 기록
  track('death', -runGold, secs, floor);
  let f = 0;
  const anim = setInterval(() => {
    deathAnim = ++f; draw(0);
    if (f >= 14) {
      clearInterval(anim);
      $('deathStats').innerHTML =
        `B<b>${floor}</b>층 · <b>${lev}배</b>에서 용암行<br>` +
        `런 골드 <b>${runGold.toLocaleString()}G</b> 전부 소실 · 실시간 <b>${secs}초</b><br>` +
        `금고 잔액 ${store.vault.toLocaleString()}G (입금 안 한 건 내 돈이 아니었다)`;
      $('lesson').textContent = deathLesson();
      lastResult = { type: 'death', floor, gold: runGold, vault: store.vault, secs };
      $('death').style.display = 'flex';
    }
  }, 55);
}
function deathLesson() {
  if (runGold >= 600) return `${runGold.toLocaleString()}G를 손에 쥐고도 하산하지 않았습니다. 실전에서 이 장면의 이름은 "미실현 수익"입니다.`;
  if (lev >= 65) return `${lev}배의 청산 거리는 ${(100 / lev).toFixed(1)}%. 고층은 스위치 실력이 아니라 그만둘 타이밍을 시험하는 곳입니다.`;
  if (switches >= 3) return `스위치 ${switches}회 — 수수료로만 ${switches * SWITCH_FEE}%를 냈습니다. 잦은 방향 전환은 확신이 아니라 공포의 증거입니다.`;
  return `방향이 틀리면 레버리지는 시간 문제입니다. 다행히 여긴 던전이라, 1층 문이 다시 열려 있습니다.`;
}

// ── 공유 카드 ──
let lastResult = null;
const escapeImg = new Image(); escapeImg.src = 'lq-escape.png';
const deathImg = new Image(); deathImg.src = 'lq-death.png';
function shareCard() {
  if (!lastResult) return;
  const r = lastResult, dead = r.type === 'death';
  const c = document.createElement('canvas'); c.width = 720; c.height = 960;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  x.fillStyle = '#100b14'; x.fillRect(0, 0, 720, 960);
  const img = dead ? deathImg : escapeImg;
  if (img.complete) x.drawImage(img, 0, 0, 720, 540);
  x.strokeStyle = dead ? '#e5533d' : '#ffd54a'; x.lineWidth = 8; x.strokeRect(4, 4, 712, 952);
  x.textAlign = 'center';
  x.fillStyle = dead ? '#ff8a70' : '#ffd54a';
  x.font = '58px Galmuri11';
  x.fillText(dead ? `B${r.floor}층 청산` : `B${r.floor}층 하산`, 360, 636);
  x.fillStyle = dead ? '#ff8a70' : '#6ee7a0';
  x.font = '40px Galmuri11';
  x.fillText(dead ? `-${r.gold.toLocaleString()}G 소실` : `+${r.gold.toLocaleString()}G 입금`, 360, 706);
  x.fillStyle = '#e8d9c0';
  x.font = '24px Galmuri9';
  x.fillText(`실시간 ${r.secs}초 · 금고 ${r.vault.toLocaleString()}G`, 360, 766);
  x.fillText(`칭호: ${rankTitle(r.vault, store.best)}`, 360, 806);
  x.fillStyle = '#9a8570';
  x.font = '20px Galmuri9';
  x.fillText('코인던전 — 청산 서바이벌', 360, 890);
  x.fillText('coindungeon.games', 360, 922);
  c.toBlob(async b => {
    const name = `코인던전-B${r.floor}층-${dead ? '청산' : '하산'}.png`;
    const file = new File([b], name, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: '코인던전 — 청산 서바이벌', text: 'https://coindungeon.games/game' }); return; } catch (e) { if (e.name === 'AbortError') return; }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  });
}

// ── 렌더 ──
const cv = $('cv'), ctx = cv.getContext('2d');
let lavaT = 0;
function draw(hp = 100) {
  lavaT += 0.15;
  const W = cv.width, H = cv.height;
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 2.2, (Math.random() - 0.5) * shake * 2.2);

  // 동굴 배경
  if (caveBg.complete) {
    ctx.globalAlpha = 0.9; ctx.drawImage(caveBg, 0, 0, W, H); ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(10,7,14,0.45)'; ctx.fillRect(0, 0, W, H);
  } else { ctx.fillStyle = '#0d0a10'; ctx.fillRect(0, 0, W, H); }

  const door = doorPrice();
  const s = Math.max(startIdx - 20, idx - VIEW), view = CANDLES.slice(s, idx + 1);
  let lo = Math.min(...view.map(c => c[2]), liq, door), hi = Math.max(...view.map(c => c[1]), liq, door);
  const pad = (hi - lo) * 0.10; lo -= pad; hi += pad;
  const Y = v => H - ((v - lo) / (hi - lo)) * H;
  const slot = W / VIEW, bw = Math.max(3, slot * 0.6);
  const liqY = Y(liq), doorY = Y(door);

  // 용암 (청산가)
  const lavaGrad = side === 1 ? ctx.createLinearGradient(0, liqY, 0, H) : ctx.createLinearGradient(0, liqY, 0, 0);
  lavaGrad.addColorStop(0, '#ff8a2d'); lavaGrad.addColorStop(0.22, '#e5341f'); lavaGrad.addColorStop(1, '#4a0b04');
  ctx.fillStyle = lavaGrad;
  ctx.beginPath();
  if (side === 1) { ctx.moveTo(0, H); ctx.lineTo(0, liqY); } else { ctx.moveTo(0, 0); ctx.lineTo(0, liqY); }
  for (let x = 0; x <= W; x += 12) {
    const wob = Math.sin(lavaT + x * 0.045) * 4 + Math.sin(lavaT * 1.7 + x * 0.02) * 3;
    ctx.lineTo(x, liqY + wob);
  }
  if (side === 1) ctx.lineTo(W, H); else ctx.lineTo(W, 0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,140,50,0.16)';
  ctx.fillRect(0, side === 1 ? liqY - 28 : liqY, W, 28);
  ctx.fillStyle = '#ffcf6b';
  for (let i = 0; i < 8; i++) {
    const bx = ((i * 173 + lavaT * 36) % W);
    const by = liqY + Math.sin(lavaT * 2 + i * 2) * 3 + (side === 1 ? 9 : -9);
    ctx.fillRect(bx, by, 4, 4);
  }

  // 황금 문 (목표 ROE 라인)
  ctx.strokeStyle = 'rgba(255,213,74,0.85)'; ctx.setLineDash([14, 8]); ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, doorY); ctx.lineTo(W, doorY); ctx.stroke(); ctx.setLineDash([]);
  const shimmer = 0.5 + Math.sin(lavaT * 2) * 0.3;
  ctx.fillStyle = `rgba(255,213,74,${shimmer})`;
  ctx.font = '20px Galmuri9';
  ctx.fillText(`황금 문 +${targetOf(floor)}%`, 12, doorY + (side === 1 ? -8 : 20));
  for (let i = 0; i < 5; i++) {
    const bx = ((i * 263 + lavaT * 20) % W);
    ctx.fillRect(bx, doorY - 2, 3, 3);
  }

  // 캔들
  view.forEach((c, i) => {
    const x = i * slot + slot / 2;
    const up = c[3] >= c[0];
    ctx.strokeStyle = up ? '#3ddc84' : '#e5533d';
    ctx.fillStyle = up ? '#3ddc84' : '#e5533d';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, Y(c[1])); ctx.lineTo(x, Y(c[2])); ctx.stroke();
    const top = Y(Math.max(c[0], c[3])), h = Math.max(3, Y(Math.min(c[0], c[3])) - top);
    ctx.fillRect(x - bw / 2, top, bw, h);
  });

  // 진입선
  ctx.strokeStyle = 'rgba(243,233,210,0.4)'; ctx.setLineDash([8, 6]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, Y(entry)); ctx.lineTo(W, Y(entry)); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(243,233,210,0.65)'; ctx.font = '18px Galmuri9';
  ctx.fillText(side === 1 ? '진입 (롱)' : '진입 (숏)', 10, Y(entry) - 6);

  // 기사
  const last = view[view.length - 1];
  const kx = (view.length - 1) * slot + slot / 2;
  const ky = Y(last[3]);
  if (deathAnim > 0) {
    ctx.fillStyle = `rgba(255,${150 - deathAnim * 8},40,${1 - deathAnim / 15})`;
    ctx.beginPath(); ctx.arc(kx, ky, deathAnim * 7, 0, 7); ctx.fill();
    ctx.fillStyle = `rgba(255,220,80,${1 - deathAnim / 15})`;
    ctx.beginPath(); ctx.arc(kx, ky, deathAnim * 3.5, 0, 7); ctx.fill();
  } else if (knight.complete) {
    const kw = 54, kh = kw * (knight.height / knight.width);
    const bounce = Math.sin(lavaT * 1.3) * 2 + (shake ? (Math.random() - 0.5) * 4 : 0);
    ctx.save();
    if (side === -1) { ctx.translate(kx, ky - kh / 2); ctx.scale(1, -1); ctx.translate(-kx, -(ky - kh / 2)); }
    ctx.drawImage(knight, kx - kw / 2, ky - kh + 4 + bounce, kw, kh);
    ctx.restore();
  }

  // 위험 비네트
  if (hp < 30 && alive) {
    const v = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.75);
    v.addColorStop(0, 'rgba(0,0,0,0)'); v.addColorStop(1, `rgba(220,40,10,${(30 - hp) / 55})`);
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

refreshTitle();
</script>
</body>
</html>

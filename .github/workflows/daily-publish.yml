name: Daily Publish

# 매일 KST 09:00 (UTC 00:00)에 빈 커밋을 push → Vercel 자동 재배포
# → 그날 발행일(publishedAt)이 된 예약 글이 사이트에 노출됨
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  redeploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 빈 커밋으로 Vercel 재배포 트리거
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: daily redeploy (예약 발행)"
          git push
